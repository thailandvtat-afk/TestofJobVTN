<!doctype html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vet Clinic Job Board | Powered by Google Sheets</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        body { font-family: 'Inter', 'Sarabun', sans-serif; }
        #map { height: 400px; border-radius: 16px; margin-bottom: 24px; border: 4px solid white; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .job-card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; transition: all 0.2s; cursor: pointer; }
        .job-card:hover { border-color: #8b5cf6; transform: translateY(-3px); }
        .form-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 9999; align-items: center; justify-content: center; padding: 16px; }
        .form-modal.active { display: flex; }
        .modal-content { background: white; border-radius: 20px; width: 100%; max-width: 550px; max-height: 90vh; overflow-y: auto; padding: 32px; }
    </style>
</head>
<body class="bg-[#fcfcff]">

    <header class="bg-gradient-to-r from-indigo-700 to-purple-600 text-white pt-10 pb-20 px-6 text-center">
        <h1 class="text-3xl font-extrabold mb-2">Vet Job Board</h1>
        <p class="text-indigo-100">ระบบประกาศงานสำหรับสัตวแพทย์ (Standalone Version)</p>
        <button onclick="openAddModal()" class="mt-6 bg-white text-indigo-700 px-6 py-3 rounded-xl font-bold shadow-lg hover:bg-indigo-50 transition-all">
            + เพิ่มประกาศใหม่
        </button>
    </header>

    <main class="max-w-5xl mx-auto px-6 -mt-12">
        <div id="map"></div>
        <div id="jobsList" class="grid gap-4 md:grid-cols-1">
            <p class="text-center text-gray-500 py-10">กำลังโหลดข้อมูลจาก Google Sheets...</p>
        </div>
    </main>

    <div id="formModal" class="form-modal">
        <div class="modal-content">
            <h2 class="text-2xl font-bold mb-6">ลงประกาศรับสมัครงาน</h2>
            <form id="jobForm" class="space-y-4">
                <input type="text" id="clinic_name" placeholder="ชื่อคลินิก" class="w-full p-3 bg-gray-50 rounded-xl" required>
                <select id="clinic_type" class="w-full p-3 bg-gray-50 rounded-xl">
                    <option value="hospital">โรงพยาบาลสัตว์</option>
                    <option value="lab">ห้องปฏิบัติการ</option>
                </select>
                <input type="text" id="position" placeholder="ตำแหน่ง" class="w-full p-3 bg-gray-50 rounded-xl" required>
                <textarea id="announcement" placeholder="รายละเอียดงาน" class="w-full p-3 bg-gray-50 rounded-xl" rows="3"></textarea>
                <input type="text" id="province" placeholder="จังหวัด" class="w-full p-3 bg-gray-50 rounded-xl" required>
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="lat" placeholder="ละติจูด (Lat)" step="any" class="p-3 bg-gray-50 rounded-xl" required>
                    <input type="number" id="lng" placeholder="ลองจิจูด (Lng)" step="any" class="p-3 bg-gray-50 rounded-xl" required>
                </div>
                <button type="submit" id="submitBtn" class="w-full py-4 bg-purple-600 text-white font-bold rounded-xl">บันทึกข้อมูล</button>
                <button type="button" onclick="closeModals()" class="w-full py-2 text-gray-400">ยกเลิก</button>
            </form>
        </div>
    </div>

    <script>
        // *** สำคัญ: นำ URL ที่ได้จาก Google Apps Script มาใส่ที่นี่ ***
        const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_WEB_APP_URL';

        let map;
        let allJobs = [];

        async function initApp() {
            initMap();
            await loadJobs();
            lucide.createIcons();
        }

        function initMap() {
            map = L.map('map').setView([13.7563, 100.5018], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        async function loadJobs() {
            try {
                const res = await fetch(APPS_SCRIPT_URL);
                allJobs = await res.json();
                renderJobs();
                updateMarkers();
            } catch (e) {
                console.error("Load failed", e);
                document.getElementById('jobsList').innerHTML = "ไม่สามารถดึงข้อมูลได้ โปรดตรวจสอบ URL ของ Apps Script";
            }
        }

        function renderJobs() {
            const list = document.getElementById('jobsList');
            list.innerHTML = allJobs.map(job => `
                <div class="job-card">
                    <h3 class="font-bold text-lg">${job.position}</h3>
                    <p class="text-purple-600 text-sm font-bold">${job.clinic_name}</p>
                    <p class="text-gray-500 text-sm mt-2">${job.announcement}</p>
                    <div class="mt-3 text-xs text-gray-400 flex gap-4">
                        <span>📍 ${job.province}</span>
                        <span>🕒 ${new Date(job.updated_at).toLocaleDateString('th-TH')}</span>
                    </div>
                </div>
            `).join('');
        }

        function updateMarkers() {
            allJobs.forEach(job => {
                L.marker([job.latitude, job.longitude])
                 .bindPopup(`<b>${job.clinic_name}</b><br>${job.position}`)
                 .addTo(map);
            });
        }
