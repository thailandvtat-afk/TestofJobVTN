<!doctype html>
<html lang="th">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vet Clinic Job Board | พัฒนาโดย VTAT</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'Sarabun', sans-serif; }
    #map { height: 450px; border-radius: 16px; margin-bottom: 24px; z-index: 10; border: 4px solid white; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    
    /* Marker Styles */
    .custom-marker { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50% 50% 50% 0; color: white; border: 2px solid white; transform: rotate(-45deg); cursor: pointer; transition: all 0.3s; }
    .custom-marker i { transform: rotate(45deg); font-style: normal; font-size: 18px; }
    .custom-marker:hover { transform: rotate(-45deg) scale(1.1); box-shadow: 0 0 15px rgba(0,0,0,0.3); }
    .marker-hospital { background: #ef4444; }
    .marker-lab { background: #3b82f6; }
    .marker-university { background: #8b5cf6; }
    .marker-company { background: #f59e0b; }

    /* UI Components */
    .job-card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .job-card:hover { border-color: #8b5cf6; transform: translateY(-3px); box-shadow: 0 12px 20px -8px rgba(139, 92, 246, 0.15); }
    .form-modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(4px); z-index: 9999; align-items: center; justify-content: center; padding: 16px; }
    .form-modal.active { display: flex; }
    .modal-content { background: white; border-radius: 20px; width: 100%; max-width: 550px; max-height: 90vh; overflow-y: auto; padding: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
    .image-preview { width: 100%; border-radius: 8px; margin-top: 10px; border: 2px dashed #e5e7eb; }
    .clinic-option { padding: 16px; border: 1px solid #f1f5f9; border-radius: 12px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.2s; background: #f8fafc; }
    .clinic-option:hover { background: #f1f5f9; border-color: #cbd5e1; transform: scale(1.01); }
  </style>
 </head>
 <body class="bg-[#fcfcff]">
  <div class="app-wrapper min-h-screen pb-20">
   
   <header class="bg-gradient-to-r from-indigo-700 via-purple-600 to-blue-600 text-white pt-10 pb-20 px-6">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
     <div>
      <h1 id="app-title" class="text-4xl font-extrabold tracking-tight mb-2">Vet Clinic Job Board</h1>
      <p class="text-indigo-100 flex items-center gap-2 text-lg">
        <i data-lucide="search" class="w-5 h-5"></i> ค้นหาโอกาสในสายงานเทคนิคการสัตวแพทย์
      </p>
     </div>
     <button id="addJobBtn" class="bg-white text-indigo-700 hover:bg-indigo-50 px-8 py-4 rounded-2xl font-bold flex items-center gap-3 transition-all shadow-xl active:scale-95">
       <i data-lucide="plus-circle"></i> ประกาศรับสมัครงาน
     </button>
    </div>
   </header>

   <main class="max-w-6xl mx-auto px-6 -mt-12">
    <div id="map"></div>

    <div class="grid lg:grid-cols-3 gap-8">
      <div class="lg:col-span-1">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 sticky top-6">
          <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
            <i data-lucide="filter" class="w-5 h-5 text-purple-500"></i> ตัวกรองประกาศ
          </h3>
          <div class="space-y-2" id="filterOptions">
            <button onclick="filterJobs('all')" class="w-full text-left px-4 py-2 rounded-lg bg-purple-50 text-purple-700 font-semibold">ทั้งหมด</button>
            <button onclick="filterJobs('hospital')" class="w-full text-left px-4 py-2 rounded-lg hover:bg-gray-50 text-gray-600">🏥 โรงพยาบาลสัตว์</button>
            <button onclick="filterJobs('lab')" class="w-full text-left px-4 py-2 rounded-lg hover:bg-gray-50 text-gray-600">🧪 ห้องปฏิบัติการ</button>
            <button onclick="filterJobs('company')" class="w-full text-left px-4 py-2 rounded-lg hover:bg-gray-50 text-gray-600">🏢 บริษัทเอกชน</button>
          </div>
        </div>
      </div>

      <div class="lg:col-span-2 space-y-4">
        <div class="flex items-center justify-between mb-2">
          <h2 class="text-xl font-bold text-gray-800">ประกาศล่าสุด</h2>
          <span id="jobCount" class="text-sm font-medium text-gray-500 bg-gray-100 px-3 py-1 rounded-full">0 ตำแหน่ง</span>
        </div>
        <div id="jobsList" class="space-y-4">
          <div class="text-center py-12 bg-white rounded-2xl border border-dashed border-gray-300">
             <div class="animate-spin inline-block w-8 h-8 border-4 border-purple-500 border-t-transparent rounded-full mb-4"></div>
             <p class="text-gray-400">กำลังเตรียมข้อมูลคลินิก...</p>
          </div>
        </div>
      </div>
    </div>
   </main>
   
   <footer class="mt-20 border-t border-gray-200 py-10 px-6">
      <div class="max-w-6xl mx-auto flex flex-col items-center text-center">
        <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mb-4">
          <i data-lucide="shield-check" class="text-purple-600 w-8 h-8"></i>
        </div>
        <p class="text-gray-800 font-bold">สมาคมเทคนิคการสัตวแพทย์แห่งประเทศไทย (VTAT)</p>
        <p class="text-gray-500 text-sm mt-1">Veterinary Technicians Association of Thailand</p>
      </div>
   </footer>
  </div>

  <div id="clinicSelectModal" class="form-modal">
   <div class="modal-content">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold text-gray-900" id="selectionTitle">เลือกจังหวัด</h2>
      <button onclick="closeModals()" class="p-2 hover:bg-gray-100 rounded-full"><i data-lucide="x" class="w-6 h-6"></i></button>
    </div>
    <div id="selectionContainer" class="space-y-2 max-height-[400px] overflow-y-auto pr-2"></div>
    <div class="mt-8 pt-6 border-t border-gray-100">
      <button onclick="showNewClinicForm()" class="w-full py-4 bg-gray-50 text-gray-600 font-bold rounded-xl border-2 border-dashed border-gray-200 hover:border-purple-400 hover:text-purple-600 transition-all">
        + สมัครคลินิกใหม่/ไม่อยู่ในรายชื่อ
      </button>
    </div>
   </div>
  </div>

  <div id="formModal" class="form-modal">
   <div class="modal-content">
    <div class="flex justify-between items-center mb-8">
     <h2 id="formTitle" class="text-2xl font-bold text-gray-900">เพิ่มประกาศงาน</h2>
     <button onclick="closeModals()" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" class="w-6 h-6"></i></button>
    </div>
    
    <form id="jobForm" class="space-y-6">
     <div id="clinicDisplay" class="bg-indigo-50 p-4 rounded-xl border border-indigo-100 mb-6 hidden">
        <span class="text-xs font-bold text-indigo-400 uppercase tracking-wider">โพสต์ในนาม:</span>
        <p id="selectedClinicName" class="text-lg font-bold text-indigo-700"></p>
     </div>

     <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="col-span-2">
       <label class="block text-sm font-bold text-gray-700 mb-2">ประเภทสถานประกอบการ</label>
       <select id="clinicType" class="w-full bg-gray-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-purple-500" required>
        <option value="hospital">🏥 โรงพยาบาลสัตว์</option>
        <option value="lab">🧪 ห้องปฏิบัติการ</option>
        <option value="university">🎓 มหาวิทยาลัย</option>
        <option value="company">🏢 บริษัทเอกชน</option>
       </select>
      </div>

      <div class="col-span-2">
       <label class="block text-sm font-bold text-gray-700 mb-2">ตำแหน่งงาน</label>
       <input type="text" id="position" class="w-full bg-gray-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-purple-500" placeholder="เช่น ผู้ช่วยสัตวแพทย์, Admin" required>
      </div>

      <div class="col-span-2">
       <label class="block text-sm font-bold text-gray-700 mb-2">รายละเอียด</label>
       <textarea id="announcement" rows="4" class="w-full bg-gray-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-purple-500" placeholder="ระบุรายละเอียดงาน สวัสดิการ หรือเงื่อนไขเพิ่มเติม..." required></textarea>
      </div>

      <div>
       <label class="block text-sm font-bold text-gray-700 mb-2">เงินเดือน</label>
       <input type="text" id="salary" class="w-full bg-gray-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-purple-500" placeholder="ระบุหรือตามตกลง">
      </div>

      <div>
       <label class="block text-sm font-bold text-gray-700 mb-2">เบอร์ติดต่อ</label>
       <input type="tel" id="phone" class="w-full bg-gray-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-purple-500" placeholder="0x-xxxxxxx">
      </div>
     </div>

     <div class="space-y-4">
       <div class="bg-gray-50 p-4 rounded-xl">
         <label class="block text-sm font-bold text-gray-700 mb-2">รูปประกาศ (Infographic)</label>
         <input type="file" id="imageInput" accept="image/*" class="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-purple-100 file:text-purple-700 hover:file:bg-purple-200">
         <img id="imagePreview" class="image-preview hidden shadow-md">
       </div>
     </div>

     <div class="flex gap-4 pt-4">
      <button type="submit" id="submitBtn" class="flex-1 bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-purple-200 transition-all">บันทึกและประกาศ</button>
      <button type="button" id="deleteBtn" class="px-6 bg-red-50 text-red-600 hover:bg-red-100 font-bold rounded-xl hidden transition-all">ลบ</button>
     </div>
    </form>
   </div>
  </div>

  <script>
    let map;
    let markers = {};
    let allJobs = [];
    let currentEditingJob = null;
    let selectedClinic = null;

    // Database Mock (In reality, this would come from a server)
    const clinicsData = {
      'กรุงเทพ': [
        { name: 'Happy Paws Clinic', lat: 13.7563, lng: 100.5018 },
        { name: 'Vet Care Center', lat: 13.7480, lng: 100.5300 },
        { name: 'Bangkok Animal Hospital', lat: 13.7650, lng: 100.4900 }
      ],
      'เชียงใหม่': [
        { name: 'Chiang Mai Pet Hospital', lat: 18.7883, lng: 98.9853 },
        { name: 'North Vet Clinic', lat: 18.7950, lng: 98.9900 }
      ],
      'ขอนแก่น': [{ name: 'KKU Vet Hospital', lat: 16.4401, lng: 102.8360 }]
    };

    // Initialization
    async function initApp() {
      await window.dataSdk.init({
        onDataChanged(data) {
          allJobs = data;
          renderJobsList();
          updateMap();
          document.getElementById('jobCount').textContent = `${data.length} ตำแหน่ง`;
        }
      });
      
      initMap();
      setupEventListeners();
      lucide.createIcons();
    }

    function initMap() {
      map = L.map('map', { scrollWheelZoom: false }).setView([13.7563, 100.5018], 6);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
    }

    function updateMap() {
      Object.values(markers).forEach(m => map.removeLayer(m));
      markers = {};

      allJobs.forEach(job => {
        const typeClasses = {
          hospital: 'marker-hospital', lab: 'marker-lab',
          university: 'marker-university', company: 'marker-company'
        };
        const iconHtml = { hospital: '🏥', lab: '🧪', university: '🎓', company: '🏢' };

        const markerIcon = L.divIcon({
          className: 'custom-div-icon',
          html: `<div class="custom-marker ${typeClasses[job.clinic_type] || 'marker-hospital'}"><i>${iconHtml[job.clinic_type] || '🏥'}</i></div>`,
          iconSize: [44, 44],
          iconAnchor: [22, 44]
        });

        const marker = L.marker([job.latitude, job.longitude], { icon: markerIcon })
          .bindPopup(`<div class="p-2"><strong>${job.clinic_name}</strong><br><small>${job.position}</small></div>`)
          .addTo(map);
        
        markers[job.__backendId] = marker;
      });
    }

    function renderJobsList(filter = 'all') {
      const list = document.getElementById('jobsList');
      const filtered = filter === 'all' ? allJobs : allJobs.filter(j => j.clinic_type === filter);

      if (filtered.length === 0) {
        list.innerHTML = `<div class="bg-white p-12 text-center rounded-2xl text-gray-400 border border-gray-100">ไม่พบประกาศงานในหมวดนี้</div>`;
        return;
      }

      list.innerHTML = filtered.map(job => `
        <div class="job-card" onclick="editJob('${job.__backendId}')">
          <div class="flex flex-col md:flex-row gap-6">
            ${job.infograph_image ? `<img src="${job.infograph_image}" class="w-full md:w-32 h-32 object-cover rounded-xl" onerror="this.remove()">` : ''}
            <div class="flex-1">
              <div class="flex justify-between items-start mb-2">
                <div>
                   <h3 class="text-xl font-bold text-gray-900">${job.position}</h3>
                   <p class="text-purple-600 font-bold text-sm">${job.clinic_name}</p>
                </div>
                <span class="px-3 py-1 bg-gray-100 text-gray-600 rounded-lg text-xs font-bold uppercase">
                  ${job.clinic_type}
                </span>
              </div>
              <p class="text-gray-500 text-sm line-clamp-2 mb-4">${job.announcement}</p>
              <div class="flex flex-wrap gap-4 text-sm text-gray-500 font-medium">
                <span class="flex items-center gap-1.5"><i data-lucide="map-pin" class="w-4 h-4 text-red-400"></i> ${job.province}</span>
                <span class="flex items-center gap-1.5"><i data-lucide="banknote" class="w-4 h-4 text-green-500"></i> ${job.salary || 'ตามตกลง'}</span>
                <span class="flex items-center gap-1.5 ml-auto"><i data-lucide="phone" class="w-4 h-4"></i> ${job.phone || '-'}</span>
              </div>
            </div>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    // Modal & Selection Logic
    function showProvinceList() {
      const container = document.getElementById('selectionContainer');
      document.getElementById('selectionTitle').innerText = "เลือกจังหวัด";
      
      let html = Object.keys(clinicsData).sort().map(province => `
        <div class="clinic-option" onclick="showClinicsInProvince('${province}')">
          <div class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600">
             <i data-lucide="map"></i>
          </div>
          <div class="flex-1">
            <p class="font-bold text-gray-800">${province}</p>
            <p class="text-xs text-gray-500">${clinicsData[province].length} สถานประกอบการ</p>
          </div>
          <i data-lucide="chevron-right" class="text-gray-300"></i>
        </div>
      `).join('');

      container.innerHTML = html;
      document.getElementById('clinicSelectModal').classList.add('active');
      lucide.createIcons();
    }

    window.showClinicsInProvince = function(province) {
      const container = document.getElementById('selectionContainer');
      document.getElementById('selectionTitle').innerText = `คลินิกใน ${province}`;
      
      let html = `<button onclick="showProvinceList()" class="mb-4 text-sm font-bold text-purple-600 flex items-center gap-1">← ย้อนกลับ</button>`;
      html += clinicsData[province].map(c => `
        <div class="clinic-option" onclick="selectClinic('${c.name}', ${c.lat}, ${c.lng}, '${province}')">
          <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center text-green-600">
             <i data-lucide="home"></i>
          </div>
          <p class="font-bold text-gray-800 flex-1">${c.name}</p>
        </div>
      `).join('');

      container.innerHTML = html;
      lucide.createIcons();
    }

    function selectClinic(name, lat, lng, province) {
      selectedClinic = { name, lat, lng, province };
      closeModals();
      resetForm();
      document.getElementById('clinicDisplay').classList.remove('hidden');
      document.getElementById('selectedClinicName').innerText = name;
      document.getElementById('formModal').classList.add('active');
    }

    // Form Handling
    async function readFile(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.readAsDataURL(file);
      });
    }

    document.getElementById('jobForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerText = "กำลังประมวลผล...";

      const fileInput = document.getElementById('imageInput');
      let imageData = currentEditingJob?.infograph_image || '';
      if (fileInput.files[0]) imageData = await readFile(fileInput.files[0]);

      const payload = {
        clinic_name: selectedClinic.name,
        clinic_type: document.getElementById('clinicType').value,
        position: document.getElementById('position').value,
        announcement: document.getElementById('announcement').value,
        salary: document.getElementById('salary').value,
        phone: document.getElementById('phone').value,
        province: selectedClinic.province,
        latitude: selectedClinic.lat,
        longitude: selectedClinic.lng,
        infograph_image: imageData,
        updated_at: new Date().toISOString()
      };

      if (currentEditingJob) {
        await window.dataSdk.update({ ...currentEditingJob, ...payload });
      } else {
        await window.dataSdk.create(payload);
      }

      closeModals();
      btn.disabled = false;
      btn.innerText = "บันทึกและประกาศ";
    };

    window.editJob = (id) => {
      const job = allJobs.find(j => j.__backendId === id);
      if (!job) return;
      currentEditingJob = job;
      selectedClinic = { name: job.clinic_name, lat: job.latitude, lng: job.longitude, province: job.province };
      
      document.getElementById('position').value = job.position;
      document.getElementById('announcement').value = job.announcement;
      document.getElementById('salary').value = job.salary;
      document.getElementById('phone').value = job.phone;
      document.getElementById('clinicType').value = job.clinic_type;
      
      if (job.infograph_image) {
        document.getElementById('imagePreview').src = job.infograph_image;
        document.getElementById('imagePreview').classList.remove('hidden');
      }

      document.getElementById('deleteBtn').classList.remove('hidden');
      document.getElementById('deleteBtn').onclick = async () => {
        if (confirm('ยืนยันการลบประกาศนี้?')) {
          await window.dataSdk.delete(job);
          closeModals();
        }
      };
      
      document.getElementById('formModal').classList.add('active');
    };

    function resetForm() {
      currentEditingJob = null;
      document.getElementById('jobForm').reset();
      document.getElementById('imagePreview').classList.add('hidden');
      document.getElementById('deleteBtn').classList.add('hidden');
    }

    function closeModals() {
      document.querySelectorAll('.form-modal').forEach(m => m.classList.remove('active'));
    }

    function setupEventListeners() {
      document.getElementById('addJobBtn').onclick = showProvinceList;
      document.getElementById('imageInput').onchange = async (e) => {
        if (e.target.files[0]) {
          document.getElementById('imagePreview').src = await readFile(e.target.files[0]);
          document.getElementById('imagePreview').classList.remove('hidden');
        }
      };
    }

    initApp();
  </script>
 </body>
</html>
